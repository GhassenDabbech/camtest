<button onclick="testCamera()">Test Camera Access</button>
<video id="testVideo" autoplay playsinline style="width: 400px;"></video>
<script>
async function testCamera() {
    try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: true });
        document.getElementById("testVideo").srcObject = stream;
        alert("Camera access granted - check if the video shows your real room");
    } catch (err) {
        alert("Camera access failed: " + err.message);
    }
}
</script>
